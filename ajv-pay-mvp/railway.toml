# Ce dépôt héberge 2 services Railway (API + Worker) qui partagent ce
# même build. startCommand et healthcheckPath ne sont PAS définis ici :
# le Worker n'a pas de serveur HTTP, donc un healthcheck partagé casserait
# son déploiement. Chaque service doit régler ça séparément dans son
# dashboard Railway (Settings > Deploy) :
#   - API (ajv-pay-mvp) : Custom Start Command = "npm run start:prod",
#     Healthcheck Path = "/health"
#   - Worker (lucky-miracle) : Custom Start Command = "npm run start:worker",
#     pas de Healthcheck Path
[build]
builder = "nixpacks"

[deploy]
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
